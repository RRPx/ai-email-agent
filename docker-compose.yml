services:
  postgres:
    image: postgres:16
    container_name: email_agent_db
    restart: always
    environment:
      POSTGRES_USER: emailagent
      POSTGRES_PASSWORD: emailagent123
      POSTGRES_DB: emailagentdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailagent -d emailagentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: email_agent_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://emailagent:emailagent123@postgres:5432/emailagentdb
      GROQ_API_KEY: ${GROQ_API_KEY}
      POLL_INTERVAL: ${POLL_INTERVAL:-120}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: email_agent_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
