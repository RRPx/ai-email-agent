services:
  postgres:
    image: postgres:16
    container_name: email_agent_db
    restart: always
    environment:
      POSTGRES_USER: emailagent
      POSTGRES_PASSWORD: emailagent123
      POSTGRES_DB: emailagentdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: email_agent_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres

volumes:
  pgdata:
